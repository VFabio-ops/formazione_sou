- hosts: all
  become: true
  become_user: root
  tasks:

    - name: Install EPEL repository
      ansible.builtin.dnf:
        name: epel-release
        state: present
    
    - name: Update all packages
      ansible.builtin.dnf:
        name: "*"
        state: latest
    
    - name: Add Docker Repository
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/rhel/docker-ce.repo
        dest: /etc/yum.repos.d/docker-ce.repo
        mode: '0644'

    - name: Install Docker
      ansible.builtin.dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
        state: present

    - name: Start and enable Docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Installing Packages
      ansible.builtin.dnf:
        name:
          - vim 
          - htop
          - curl
          - net-tools
          - python3-pip
          - wget
          - tar
        state: latest