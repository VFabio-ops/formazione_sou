---
- name: Install EPEL repository
  ansible.builtin.dnf:
    name: epel-release
    state: present

- name: Installazione podman
  ansible.builtin.dnf: 
    name: 
      - podman
      - shadow-utils-subid
      - podman-compose
      - buildah
      - skopeo
      - python3
      - python3-pip
      - python3-podman
      - python3-requests
    state: latest

- name: Abilitazione del socket Podman (per API REST)
  ansible.builtin.systemd:
    name: podman.socket
    state: started
    enabled: true

- name: Verifica dell'installazione di Podman
  ansible.builtin.command: podman --version
  register: podman_ver 
  changed_when: false

- name: Mostra versione Podman
  ansible.builtin.debug:
    msg: "Podman version: {{ podman_ver.stdout }}"

- name: Configurazioni registri Podman
  ansible.builtin.copy:
    dest: /etc/containers/registries.conf.d/01-docker-hub.conf
    content: |
      [[registry]]
      location = "docker.io"
      insecure = false
    mode: '0644'