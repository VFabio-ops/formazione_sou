---
- name: "Creazione directory per Jenkins"
  ansible.builtin.file:
    path: "{{ jenkins_master_data_dir }}"
    state: directory
    mode: '0755'
    owner: "1000"
    group: "1000"

- name: "Creazione directory script init.groovy.d"
  ansible.builtin.file:
    path: "{{ jenkins_master_data_dir }}/init.groovy.d"
    state: directory
    mode: '0755'
    owner: "1000"
    group: "1000"

- name: "Script Groovy per utente admin"
  ansible.builtin.copy:
    dest: "{{ jenkins_master_data_dir }}/init.groovy.d/01_create_admin.groovy"
    owner: "1000"
    group: "1000"
    mode: '0644'
    content: |
      import jenkins.model.*
      import hudson.security.*
      import jenkins.security.s2m.AdminWhitelistRule

      def instance = Jenkins.getInstance()

      // Configura il security realm con database utenti locale
      def hudsonRealm = new HudsonPrivateSecurityRealm(false)
      hudsonRealm.createAccount("{{ jenkins_admin_user }}", "{{ jenkins_admin_password }}")
      instance.setSecurityRealm(hudsonRealm)

      // Autorizza solo gli utenti loggati a fare tutto
      def strategy = new FullControlOnceLoggedInAuthorizationStrategy()
      strategy.setAllowAnonymousRead(false)
      instance.setAuthorizationStrategy(strategy)

      // Abilita Agent-to-Master Security con whitelist
      instance.getInjector().getInstance(AdminWhitelistRule.class).setMasterKillSwitch(false)

      instance.save()

- name: "Creazione script Groovy per disabilitare wizard"
  ansible.builtin.copy:
    dest: "{{ jenkins_master_data_dir }}/init.groovy.d/00_disable_wizard.groovy"
    owner: "1000"
    group: "1000"
    mode: '0644'
    content: |
     import jenkins.model.Jenkins
      import jenkins.install.InstallState

      def instance = Jenkins.getInstance()
      if (!instance.installState.isSetupComplete()) {
        instance.installState = InstallState.INITIAL_SETUP_COMPLETED
      }

- name: "Podman avvio container Jenkins Master"
  containers.podman.podman_container:
    name: "{{ jenkins_master_container_name }}"
    image: "{{ jenkins_master_image }}"
    state: started
    restart_policy: always
    network: "{{ container_network_name }}"
    ip: "{{ jenkins_master_ip }}"
    ports:
      - "{{ jenkins_master_http_port }}:8080"
      - "{{ jenkins_master_agent_port }}:50000"
    volumes:
      - "{{ jenkins_master_data_dir }}:/var/jenkins_home:Z"
    env:
      JAVA_OPTS: "-Xmx2g"
  when: container_runtime == 'podman'

- name: "Attesa avvio Jenkins Master"
  ansible.builtin.uri:
    url: "http://{{ jenkins_master_ip }}:8080/login"
    method: GET
    status_code: 200
    validate_certs: false
  register: jenkins_health
  until: jenkins_health.status == 200
  retries: 20
  delay: 10

- name: "Verifica autenticazione API Jenkins"
  ansible.builtin.uri:
    url: "http://{{ jenkins_master_ip }}:8080/api/json"
    method: GET
    user: "{{ jenkins_admin_user }}"
    password: "{{ jenkins_admin_password }}"
    force_basic_auth: true
    status_code: 200
    validate_certs: false
  register: api_check
  until: api_check.status == 200
  retries: 15
  delay: 10

- name: "Jenkins avviato con successo"
  ansible.builtin.debug:
    msg: "Jenkins Master accessibile all'indirizzo http://localhost:8080 o http://{{ jenkins_master_ip }}:8080"

