[defaults]
inventory       = ansible/inventory/hosts.yml
remote_user     = vagrant
host_key_checking = False
log_path          = /tmp/ansible.log
interpreter_python = auto_silent
forks             = 5
timeout           = 30
deprecation_warnings = False 

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False